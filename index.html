<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Report Generator - Fixed Conversions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .report-table { border-collapse: collapse; width: 100%; font-family: sans-serif; }
        .report-table th { background: #E2E2E2; border: 1px solid #999; padding: 4px 8px; font-size: 11px; text-transform: uppercase; }
        .report-table td { border: 1px solid #999; padding: 6px 8px; font-size: 13px; }
        .flow-cell { background: #FFFF00; font-weight: bold; text-align: center; vertical-align: middle; width: 160px; line-height: 1.2; }
        .week-cell { background: #fff; width: 110px; font-weight: 500; }
        .header-total { background: #FFF2CC; text-align: center; font-weight: bold; border-bottom: 2px solid #999; }
        .spacer-row td { height: 12px; border: none !important; background: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-bold text-gray-800">Automation Report Generator <span class="text-green-600 text-sm ml-2">(Conversions Fixed)</span></h1>
            <div class="flex gap-2">
                <button onclick="downloadExcel()" class="bg-green-600 text-white px-4 py-2 rounded text-sm font-bold hover:bg-green-700">Download for Excel</button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="p-4 border-2 border-dashed rounded bg-gray-50">
                <label class="block font-bold text-sm mb-2">1. Upload CSV</label>
                <input type="file" id="csvFile" accept=".csv" class="text-xs">
            </div>
            <div>
                <label class="block font-bold text-sm mb-2">2. Or Paste from Excel</label>
                <textarea id="pasteArea" rows="2" class="w-full border p-2 text-xs font-mono rounded" placeholder="Paste data here..."></textarea>
                <button onclick="processInput()" class="mt-2 w-full bg-slate-800 text-white py-2 rounded text-sm font-bold hover:bg-black transition">Generate Report</button>
            </div>
        </div>

        <div id="reportContainer" class="hidden">
            <div class="overflow-x-auto border rounded shadow-inner">
                <table class="report-table" id="outputTable">
                    <thead>
                        <tr>
                            <th rowspan="2" style="background: white; border:none;"></th>
                            <th rowspan="2" style="background: white; border:none;"></th>
                            <th colspan="7" class="header-total text-sm">Total</th>
                        </tr>
                        <tr>
                            <th>Sent</th>
                            <th>Delivered</th>
                            <th>Read/Opens</th>
                            <th>Clicks</th>
                            <th>Conversions</th>
                            <th>Revenue</th>
                            <th>AOV</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let reportDataForCSV = [];

        function processInput() {
            const text = document.getElementById('pasteArea').value.trim();
            if(!text) return;
            Papa.parse(text, { header: true, dynamicTyping: true, complete: (r) => buildReport(r.data) });
        }

        document.getElementById('csvFile').addEventListener('change', (e) => {
            Papa.parse(e.target.files[0], { header: true, dynamicTyping: true, complete: (r) => buildReport(r.data) });
        });

        function getWeekLabel(dateStr) {
            const date = new Date(dateStr);
            if (isNaN(date)) return null;
            const day = date.getDate();
            const month = date.toLocaleString('default', { month: 'short' });
            if (day <= 7) return `${month} 1-7`;
            if (day <= 14) return `${month} 8-14`;
            if (day <= 21) return `${month} 15-21`;
            return `${month} 22+`;
        }

        function buildReport(rawData) {
            const flows = {};
            const findKey = (row, partial) => Object.keys(row).find(k => k.toLowerCase().includes(partial.toLowerCase()));

            rawData.forEach(row => {
                const fName = row[findKey(row, "Flow Name")];
                const dateVal = row[findKey(row, "Day")];
                const week = getWeekLabel(dateVal);
                if (!fName || !week) return;

                if (!flows[fName]) flows[fName] = {};
                if (!flows[fName][week]) {
                    flows[fName][week] = { sent: 0, delivered: 0, opens: 0, clicks: 0, conv: 0, rev: 0 };
                }

                const g = flows[fName][week];
                
                // MAPPING LOGIC
                g.sent += (parseFloat(row[findKey(row, "Delivered")]) || parseFloat(row[findKey(row, "Total Reci")]) || 0);
                g.delivered += (parseFloat(row[findKey(row, "Delivered")]) || parseFloat(row[findKey(row, "Total Reci")]) || 0);
                g.opens += (parseFloat(row[findKey(row, "Unique Op")]) || parseFloat(row[findKey(row, "Read")]) || 0);
                g.clicks += (parseFloat(row[findKey(row, "Unique Cli")]) || parseFloat(row[findKey(row, "Clicks")]) || 0);
                
                // --- FIX FOR CONVERSIONS ---
                // It now searches for "Placed Order", "Total Place", "Placed", or "Conversions"
                const convVal = parseFloat(row[findKey(row, "Placed Order")]) || 
                                parseFloat(row[findKey(row, "Total Place")]) || 
                                parseFloat(row[findKey(row, "Placed")]) || 
                                parseFloat(row[findKey(row, "Conversions")]) || 0;
                g.conv += convVal;
                
                g.rev += (parseFloat(row[findKey(row, "Revenue")]) || 0);
            });

            renderTable(flows);
        }

        function renderTable(flows) {
            const body = document.getElementById('reportTableBody');
            body.innerHTML = '';
            reportDataForCSV = [];

            Object.keys(flows).forEach(flowName => {
                const weeks = flows[flowName];
                
                // Chrono-sort weeks
                const weekKeys = Object.keys(weeks).sort((a, b) => {
                    const numA = parseInt(a.match(/\d+/)[0]);
                    const numB = parseInt(b.match(/\d+/)[0]);
                    return numA - numB;
                });

                weekKeys.forEach((week, index) => {
                    const data = weeks[week];
                    const aov = data.conv > 0 ? (data.rev / data.conv).toFixed(0) : 0;
                    
                    const tr = document.createElement('tr');
                    let flowCellHtml = '';
                    if (index === 0) {
                        flowCellHtml = `<td rowspan="${weekKeys.length}" class="flow-cell">${flowName}</td>`;
                    }

                    tr.innerHTML = `
                        ${flowCellHtml}
                        <td class="week-cell">${week}</td>
                        <td>${Math.round(data.sent).toLocaleString()}</td>
                        <td>${Math.round(data.delivered).toLocaleString()}</td>
                        <td>${Math.round(data.opens).toLocaleString()}</td>
                        <td>${Math.round(data.clicks).toLocaleString()}</td>
                        <td>${Math.round(data.conv).toLocaleString()}</td>
                        <td>$${data.rev.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                        <td>${aov}</td>
                    `;
                    body.appendChild(tr);

                    // Add explicitly to the CSV data object
                    reportDataForCSV.push({
                        "Flow": index === 0 ? flowName : "",
                        "Week": week,
                        "Sent": Math.round(data.sent),
                        "Delivered": Math.round(data.delivered),
                        "Read/Opens": Math.round(data.opens),
                        "Clicks": Math.round(data.clicks),
                        "Conversions": Math.round(data.conv), // This will now show up in Excel
                        "Revenue": data.rev.toFixed(2),
                        "AOV": aov
                    });
                });
                
                const spacer = document.createElement('tr');
                spacer.className = 'spacer-row';
                spacer.innerHTML = `<td colspan="9"></td>`;
                body.appendChild(spacer);
            });

            document.getElementById('reportContainer').classList.remove('hidden');
        }

        function downloadExcel() {
            if(reportDataForCSV.length === 0) return alert("Generate the report first!");
            const csv = Papa.unparse(reportDataForCSV);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `Automation_Summary_Report_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }
    </script>
</body>
</html>
